<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dunia Anak Sholeh Super App</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  font-family: Arial;
  margin:0;
  padding:15px;
  background: linear-gradient(to bottom,#4FC3F7,#6EE7B7);
  color:white;
  text-align:center;
}

/* ===== CARD UMUM ===== */
.section{
  background:white;
  color:#333;
  margin:20px auto;
  padding:15px;
  border-radius:20px;
  max-width:500px;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.word{
  background:#FFD93D;
  margin:6px;
  padding:8px;
  border-radius:10px;
  cursor:pointer;
}

button{
  background:#FF6FAE;
  border:none;
  padding:10px 15px;
  margin:6px;
  border-radius:12px;
  color:white;
  cursor:pointer;
}

input{
  padding:8px;
  border-radius:10px;
  border:1px solid #ccc;
}

/* ===== AVATAR 3D ===== */
.avatar{
  width:130px;
  height:130px;
  margin:20px auto;
  position:relative;
}
.hijab{
  width:130px;
  height:130px;
  background: radial-gradient(circle at 40% 30%, #FFB6D9, #FF6FAE);
  border-radius:50%;
  position:absolute;
}
.face{
  width:95px;
  height:95px;
  background:#FFE0BD;
  border-radius:50%;
  position:absolute;
  top:20px;
  left:17px;
}
.eye{
  width:14px;
  height:14px;
  background:black;
  border-radius:50%;
  position:absolute;
  top:45px;
}
.eye.left{left:40px;}
.eye.right{right:40px;}
.mouth{
  width:35px;
  height:15px;
  background:#FF4F81;
  border-radius:0 0 35px 35px;
  position:absolute;
  bottom:35px;
  left:47px;
  transition:0.1s;
}
.talk{height:30px!important;}

.lock{
  background:#eee;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
}

.levelbox{
  background:white;
  color:#333;
  padding:8px;
  border-radius:12px;
  max-width:300px;
  margin:10px auto;
  font-weight:bold;
}

/* ===== ARABIKA STYLE ===== */
.arabika-card{
  font-family:'Poppins',sans-serif;
  background:white;
  color:#333;
  border-radius:30px;
  padding:20px;
  max-width:450px;
  margin:30px auto;
  box-shadow:0 20px 40px rgba(0,0,0,0.1);
}

.mode-btn{
  padding:8px 15px;
  border-radius:20px;
  border:2px solid #2d6a4f;
  background:transparent;
  cursor:pointer;
  font-size:12px;
  font-weight:bold;
  color:#2d6a4f;
}

.mode-btn.active{
  background:#2d6a4f;
  color:white;
}

.mic-btn{
  background:#2d6a4f;
  color:white;
  border:none;
  width:70px;
  height:70px;
  border-radius:50%;
  font-size:30px;
  cursor:pointer;
}
</style>
</head>

<body>

<h2>🌙 Dunia Anak Sholeh</h2>
<p>Belajar Arab Ceria Anak Muslim</p>

<div class="avatar">
  <div class="hijab"></div>
  <div class="face"></div>
  <div class="eye left"></div>
  <div class="eye right"></div>
  <div class="mouth" id="mouth"></div>
</div>

<div id="levelBox" class="levelbox"></div>

<div class="section">
<h3>🔓 Aktifkan Premium</h3>
<input type="password" id="kode" placeholder="Masukkan kode">
<button onclick="unlock()">Unlock</button>
<div id="status"></div>
</div>

<div class="section">
<h3>🍎 Belajar Buah</h3>
<div id="buah"></div>
</div>

<div class="section">
<h3>🐰 Belajar Hewan</h3>
<div id="hewan"></div>
</div>

<div class="section">
<h3>👧 Quiz</h3>
<button onclick="startQuiz()">Mulai Quiz</button>
<div id="quizArea"></div>
<div id="score"></div>
</div>

<!-- ================= ARABIKA ================= -->

<div class="arabika-card">
<h3>🕌 ARABIKA - Kamus Suara</h3>

<div>
<button id="mode-ar" class="mode-btn active">Bicara Arab</button>
<button id="mode-id" class="mode-btn">Sebut Indo</button>
</div>

<p id="status-ar">Ketuk mic untuk mulai</p>
<div id="output" style="font-size:22px;direction:rtl;"></div>
<div id="translation"></div>

<button id="start-btn" class="mic-btn">🎙️</button>
</div>

<script>

/* ================= DUNIA ANAK SHOLEH ================= */

let premium=false;
let level=1;
let stars=0;

function updateLevelUI(){
document.getElementById("levelBox").innerHTML="⭐ "+stars+" | 🏆 Level "+level;
}
updateLevelUI();

function unlock(){
if(document.getElementById("kode").value==="ANAKSOLEH2026"){
premium=true;
document.getElementById("status").innerHTML="✅ Premium Aktif!";
renderData();
}
}

function speak(text){
let u=new SpeechSynthesisUtterance(text);
u.lang="ar-SA";
document.getElementById("mouth").classList.add("talk");
u.onend=function(){
document.getElementById("mouth").classList.remove("talk");
}
speechSynthesis.speak(u);
}

const buahData=[["تُفَّاحٌ","Apel"],["مَوْزٌ","Pisang"],["بُرْتُقَالٌ","Jeruk"],["عِنَبٌ","Anggur"],["فَرَاوِلَةٌ","Stroberi"]];
const hewanData=[["قِطٌّ","Kucing"],["كَلْبٌ","Anjing"],["أَرْنَبٌ","Kelinci"],["فِيلٌ","Gajah"],["أَسَدٌ","Singa"]];

function renderData(){
let buahHTML="",hewanHTML="";
for(let i=0;i<buahData.length;i++){
buahHTML+=`<div class="word" onclick="speak('${buahData[i][0]}')">${buahData[i][0]} - ${buahData[i][1]}</div>`;
hewanHTML+=`<div class="word" onclick="speak('${hewanData[i][0]}')">${hewanData[i][0]} - ${hewanData[i][1]}</div>`;
}
document.getElementById("buah").innerHTML=buahHTML;
document.getElementById("hewan").innerHTML=hewanHTML;
}
renderData();

/* ================= ARABIKA ================= */

let currentMode="ar-SA";

document.getElementById("mode-ar").onclick=()=>{
currentMode="ar-SA";
document.getElementById("mode-ar").classList.add("active");
document.getElementById("mode-id").classList.remove("active");
};

document.getElementById("mode-id").onclick=()=>{
currentMode="id-ID";
document.getElementById("mode-id").classList.add("active");
document.getElementById("mode-ar").classList.remove("active");
};

const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
const recognition=new SpeechRecognition();

document.getElementById("start-btn").onclick=()=>{
recognition.lang=currentMode;
recognition.start();
document.getElementById("status-ar").innerText="Mendengarkan...";
};

recognition.onresult=(event)=>{
let result=event.results[0][0].transcript.toLowerCase();
document.getElementById("output").innerText=result;
document.getElementById("translation").innerText="Terdeteksi ✔";
speak(result);
};

recognition.onspeechend=()=>recognition.stop();

</script>
</body>
</html>
