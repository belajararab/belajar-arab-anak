<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dunia Anak Sholeh Super AI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Poppins',sans-serif;
  margin:0;
  padding:15px;
  background:linear-gradient(to bottom,#4FC3F7,#6EE7B7);
  text-align:center;
  color:white;
}

.avatar img{
  width:150px;
  height:150px;
  border-radius:50%;
  object-fit:cover;
  border:5px solid #FF6FAE;
  box-shadow:0 5px 20px rgba(0,0,0,0.3);
  transition:0.3s;
}

.talk{
  animation:glow 0.5s infinite alternate;
}

@keyframes glow{
  from{box-shadow:0 0 10px #ff6fae;}
  to{box-shadow:0 0 30px #ff1493;}
}

.section,.arabika-card{
  background:white;
  color:#333;
  margin:20px auto;
  padding:15px;
  border-radius:20px;
  max-width:500px;
}

.word{
  background:#FFD93D;
  margin:6px;
  padding:8px;
  border-radius:10px;
  cursor:pointer;
}

button{
  background:#FF6FAE;
  border:none;
  padding:8px 14px;
  margin:6px;
  border-radius:12px;
  color:white;
  cursor:pointer;
}

.mic-btn{
  width:70px;
  height:70px;
  border-radius:50%;
  font-size:28px;
}

.levelbox{
  background:white;
  color:#333;
  padding:8px;
  border-radius:12px;
  max-width:300px;
  margin:10px auto;
  font-weight:bold;
}
</style>
</head>

<body>

<h2>🌙 Dunia Anak Sholeh</h2>

<div class="avatar">
<img id="avatarImg" src="https://www.dropbox.com/scl/fi/isjmai97h2zzojhksgkrq/1000376495.jpg?raw=1">
</div>

<div id="levelBox" class="levelbox"></div>

<div class="section">
<h3>🔓 Aktifkan Premium</h3>
<input type="password" id="kode">
<button onclick="unlock()">Unlock</button>
<div id="status"></div>
</div>

<div class="section">
<h3>🍎 Buah & Hewan</h3>
<div id="buah"></div>
<div id="hewan"></div>
</div>

<div class="section">
<h3>📖 Hafalan Doa</h3>
<button onclick="mulaiHafalan()">Mulai Hafalan</button>
<div id="hafalanStatus"></div>
</div>

<div class="arabika-card">
<h3>🕌 ARABIKA SUPER AI</h3>
<p id="status-ar">Tekan mic untuk bicara</p>
<div id="output"></div>
<div id="translation"></div>
<button id="start-btn" class="mic-btn">🎙️</button>
</div>

<script>

/* ================= STATE ================= */

let premium=false;
let xp=0;
let level=1;
let currentDoa=null;

/* ================= LEVEL ================= */

function updateLevel(){
  if(xp>=level*5){
    level++;
    speak("ما شاء الله لقد ارتفع مستواك");
  }
  document.getElementById("levelBox").innerHTML=
  "⭐ XP "+xp+" | 🏆 Level "+level;
}
updateLevel();

/* ================= PREMIUM ================= */

function unlock(){
  if(document.getElementById("kode").value==="ANAKSOLEH2026"){
    premium=true;
    document.getElementById("status").innerHTML="✅ Premium Aktif!";
  }
}

/* ================= SPEAK ================= */

function speak(text){
  let u=new SpeechSynthesisUtterance(text);
  u.lang="ar-SA";
  let avatar=document.getElementById("avatarImg");
  avatar.classList.add("talk");
  u.onend=()=>avatar.classList.remove("talk");
  speechSynthesis.speak(u);
}

/* ================= DATA ================= */

const buahData=[
["تُفَّاحٌ","Apel"],
["مَوْزٌ","Pisang"],
["بُرْتُقَالٌ","Jeruk"],
["عِنَبٌ","Anggur"],
["فَرَاوِلَةٌ","Stroberi"],
["مَانْجُو","Mangga"],
["بَابَايَا","Pepaya"],
["أَنَانَاس","Nanas"],
["بِطِّيخ","Semangka"],
["شَمَّام","Melon"],
["رُمَّان","Delima"],
["كُمَّثْرَى","Pir"],
["خَوْخ","Persik"],
["مِشْمِش","Aprikot"],
["كِيوِي","Kiwi"],
["جَوَافَة","Jambu"],
["لَيْمُون","Lemon"],
["جُوزُ الْهِنْد","Kelapa"],
["تَمْر","Kurma"],
["تِين","Tin"],
["أَفُوكَادُو","Alpukat"],
["كَرَز","Ceri"],
["تُوت","Beri"],
["دُرِيَان","Durian"],
["سَلَك","Salak"]
];


const hewanData=[
["قِطٌّ","Kucing"],
["كَلْبٌ","Anjing"],
["أَرْنَبٌ","Kelinci"],
["فِيلٌ","Gajah"],
["أَسَدٌ","Singa"],
["نَمِر","Harimau"],
["زَرَافَة","Jerapah"],
["قِرْد","Monyet"],
["حِصَان","Kuda"],
["بَقَرَة","Sapi"],
["غَنَم","Kambing"],
["دَجَاجَة","Ayam"],
["بَطَّة","Bebek"],
["سَمَكَة","Ikan"],
["سُلَحْفَاة","Kura-kura"],
["تِمْسَاح","Buaya"],
["ذِئْب","Serigala"],
["ثَعْلَب","Rubah"],
["دُبّ","Beruang"],
["حِمَار","Keledai"],
["غُزَال","Rusa"],
["خُفَّاش","Kelelawar"],
["نَحْلَة","Lebah"],
["فَرَاشَة","Kupu-kupu"],
["نَمْلَة","Semut"]
];


function renderData(){
let buahHTML="";
let hewanHTML="";

buahData.forEach(b=>{
buahHTML+=`<div class="word" onclick="speak('${b[0]}')">${b[0]} - ${b[1]}</div>`;
});

hewanData.forEach(h=>{
hewanHTML+=`<div class="word" onclick="speak('${h[0]}')">${h[0]} - ${h[1]}</div>`;
});

document.getElementById("buah").innerHTML=buahHTML;
document.getElementById("hewan").innerHTML=hewanHTML;
}
renderData();

/* ================= QA RANDOM ================= */

const qaDatabase=[

{keys:["assalamualaikum"],
 answers:[
 "وعليكم السلام ورحمة الله وبركاته",
 "وعليكم السلام أهلا وسهلا",
 "وعليكم السلام يا صديقي"
 ]},

{keys:["apa kabar"],
 answers:[
 "أنا بخير الحمد لله",
 "الحمد لله أنا سعيد اليوم",
 "أنا بخير كيف حالك أنت"
 ]},

{keys:["siapa kamu"],
 answers:[
 "أنا أرابيكا صديقتك في التعلم",
 "أنا مساعدتك لتعلم اللغة العربية",
 "أنا هنا لأساعدك يا بطل"
 ]},

{keys:["siapa allah"],
 answers:[
 "الله هو ربنا خالق كل شيء",
 "الله هو الخالق العظيم",
 "الله رب العالمين"
 ]},

{keys:["siapa nabi"],
 answers:[
 "نبينا هو محمد صلى الله عليه وسلم",
 "محمد صلى الله عليه وسلم هو رسول الله",
 "هو خاتم الأنبياء"
 ]},

{keys:["terima kasih"],
 answers:[
 "عفوا بارك الله فيك",
 "لا شكر على واجب",
 "جزاك الله خيرا"
 ]}
];

/* ================= DOA ================= */

const doaList=[
{nama:"Doa Sebelum Makan",teks:"bismillah"},
{nama:"Doa Sesudah Makan",teks:"alhamdulillahilladzi"},
{nama:"Doa Sebelum Tidur",teks:"bismika allahumma"},
{nama:"Doa Bangun Tidur",teks:"alhamdulillahilladzi ahyana"},
{nama:"Doa Masuk Rumah",teks:"allahumma inni"},
{nama:"Doa Keluar Rumah",teks:"bismillahi tawakkaltu"}
];

function mulaiHafalan(){
let r=Math.floor(Math.random()*doaList.length);
currentDoa=doaList[r];
document.getElementById("hafalanStatus").innerText=
"Silakan baca: "+currentDoa.nama;
speak("إقرأ "+currentDoa.nama);
}

/* ================= MIC ================= */

const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
const recognition=new SpeechRecognition();
recognition.lang="id-ID";

document.getElementById("start-btn").onclick=()=>{
recognition.start();
document.getElementById("status-ar").innerText="Mendengarkan...";
};

recognition.onresult=(e)=>{
let result=e.results[0][0].transcript.toLowerCase();
document.getElementById("output").innerText=result;

if(currentDoa){
if(result.includes(currentDoa.teks)){
xp+=2; updateLevel();
speak("ما شاء الله حفظك صحيح");
}else{
speak("حاول مرة أخرى");
}
currentDoa=null;
return;
}

let jawab="ما شاء الله سؤالك جميل";
let match=false;

qaDatabase.forEach(q=>{
q.keys.forEach(k=>{
if(result.includes(k)){
let randomIndex=Math.floor(Math.random()*q.answers.length);
jawab=q.answers[randomIndex];
match=true;
}
});
});

if(match){
xp++; updateLevel();
}

document.getElementById("translation").innerText=jawab;
speak(jawab);
};

recognition.onspeechend=()=>recognition.stop();

</script>
</body>
</html>
