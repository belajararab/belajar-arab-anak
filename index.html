<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dunia Anak Sholeh Super App</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  font-family: Arial;
  margin:0;
  padding:15px;
  background: linear-gradient(to bottom,#4FC3F7,#6EE7B7);
  color:white;
  text-align:center;
}

/* ===== AVATAR FOTO ===== */
.avatar{
  width:150px;
  height:150px;
  margin:20px auto;
  position:relative;
}

.avatar img{
  width:150px;
  height:150px;
  border-radius:50%;
  object-fit:cover;
  border:5px solid #FF6FAE;
  box-shadow:0 5px 20px rgba(0,0,0,0.3);
  transition:0.2s;
}

/* Efek saat bicara */
.talk{
  animation: glow 0.5s infinite alternate;
}

@keyframes glow{
  from{box-shadow:0 0 10px #ff6fae;}
  to{box-shadow:0 0 30px #ff1493;}
}

/* ===== CARD UMUM ===== */
.section{
  background:white;
  color:#333;
  margin:20px auto;
  padding:15px;
  border-radius:20px;
  max-width:500px;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.word{
  background:#FFD93D;
  margin:6px;
  padding:8px;
  border-radius:10px;
  cursor:pointer;
}

button{
  background:#FF6FAE;
  border:none;
  padding:10px 15px;
  margin:6px;
  border-radius:12px;
  color:white;
  cursor:pointer;
}

input{
  padding:8px;
  border-radius:10px;
  border:1px solid #ccc;
}

.levelbox{
  background:white;
  color:#333;
  padding:8px;
  border-radius:12px;
  max-width:300px;
  margin:10px auto;
  font-weight:bold;
}

/* ===== ARABIKA STYLE ===== */
.arabika-card{
  font-family:'Poppins',sans-serif;
  background:white;
  color:#333;
  border-radius:30px;
  padding:20px;
  max-width:450px;
  margin:30px auto;
  box-shadow:0 20px 40px rgba(0,0,0,0.1);
}

.mode-btn{
  padding:8px 15px;
  border-radius:20px;
  border:2px solid #2d6a4f;
  background:transparent;
  cursor:pointer;
  font-size:12px;
  font-weight:bold;
  color:#2d6a4f;
}

.mode-btn.active{
  background:#2d6a4f;
  color:white;
}

.mic-btn{
  background:#2d6a4f;
  color:white;
  border:none;
  width:70px;
  height:70px;
  border-radius:50%;
  font-size:30px;
  cursor:pointer;
}
</style>
</head>

<body>

<h2>🌙 Dunia Anak Sholeh</h2>
<p>Belajar Arab Ceria Anak Muslim</p>

<!-- AVATAR FOTO -->
<div class="avatar">
  <img id="avatarImg" src="https://www.dropbox.com/scl/fi/isjmai97h2zzojhksgkrq/1000376495.jpg?rlkey=tu6gf34mdj9q09qg9ga3jqvgp&raw=1">
</div>

<div id="levelBox" class="levelbox"></div>

<div class="section">
<h3>🔓 Aktifkan Premium</h3>
<input type="password" id="kode" placeholder="Masukkan kode">
<button onclick="unlock()">Unlock</button>
<div id="status"></div>
</div>

<div class="section">
<h3>🍎 Belajar Buah</h3>
<div id="buah"></div>
</div>

<div class="section">
<h3>🐰 Belajar Hewan</h3>
<div id="hewan"></div>
</div>

<div class="section">
<h3>👧 Quiz</h3>
<button onclick="startQuiz()">Mulai Quiz</button>
<div id="quizArea"></div>
<div id="score"></div>
</div>

<div class="arabika-card">
<h3>🕌 ARABIKA - Kamus Suara</h3>

<div>
<button id="mode-ar" class="mode-btn active">Bicara Arab</button>
<button id="mode-id" class="mode-btn">Sebut Indo</button>
</div>

<p id="status-ar">Ketuk mic untuk mulai</p>
<div id="output" style="font-size:22px;direction:rtl;"></div>
<div id="translation"></div>

<button id="start-btn" class="mic-btn">🎙️</button>
</div>

<script>

/* ===== DATA ===== */

let premium=false;
let level=1;
let stars=0;

function updateLevelUI(){
document.getElementById("levelBox").innerHTML="⭐ "+stars+" | 🏆 Level "+level;
}
updateLevelUI();

function unlock(){
if(document.getElementById("kode").value==="ANAKSOLEH2026"){
premium=true;
document.getElementById("status").innerHTML="✅ Premium Aktif!";
}
}

function speak(text){
let u=new SpeechSynthesisUtterance(text);
u.lang="ar-SA";

let avatar=document.getElementById("avatarImg");
avatar.classList.add("talk");

u.onend=function(){
avatar.classList.remove("talk");
}

speechSynthesis.speak(u);
}

const buahData=[["تُفَّاحٌ","Apel"],["مَوْزٌ","Pisang"],["بُرْتُقَالٌ","Jeruk"],["عِنَبٌ","Anggur"],["فَرَاوِلَةٌ","Stroberi"],["بَطِّيخٌ","Semangka"],["أَنَانَاسٌ","Nanas"],["مَانْجَا","Mangga"],["كَرَزٌ","Ceri"],["خَوْخٌ","Persik"],["لَيْمُونٌ","Lemon"],["رُمَّانٌ","Delima"],["جَوَّافَةٌ","Jambu"],["تَمْرٌ","Kurma"],["كُمَّثْرَى","Pir"],["أُفُوكَادُو","Alpukat"],["تِينٌ","Tin"],["زَبِيبٌ","Kismis"],["جُوزُ الْهِنْدِ","Kelapa"],["بَابَايَا","Pepaya"],["كِيوِي","Kiwi"],["سَفَرْجَلٌ","Quince"],["جِرِيبْ فُرُوت","Grapefruit"],["لِيتْشِي","Leci"],["تَمَرْ هِنْدِي","Asam"]];
const hewanData=[["قِطٌّ","Kucing"],["كَلْبٌ","Anjing"],["أَرْنَبٌ","Kelinci"],["فِيلٌ","Gajah"],["أَسَدٌ","Singa"],["بَقَرَةٌ","Sapi"],["حِصَانٌ","Kuda"],["دَجَاجَةٌ","Ayam"],["سَمَكَةٌ","Ikan"],["طَائِرٌ","Burung"],["قِرْدٌ","Monyet"],["نَمِرٌ","Harimau"],["زَرَافَةٌ","Jerapah"],["ذِئْبٌ","Serigala"],["دُبٌّ","Beruang"],["جَمَلٌ","Unta"],["غَنَمٌ","Kambing"],["حِمَارٌ","Keledai"],["فَأْرٌ","Tikus"],["ثُعْبَانٌ","Ular"],["سُلَحْفَاةٌ","Kura-kura"],["ضِفْدَعٌ","Katak"],["نَحْلَةٌ","Lebah"],["بَطَّةٌ","Bebek"],["حُوتٌ","Paus"]];

function renderData(){
let buahHTML="",hewanHTML="";
for(let i=0;i<buahData.length;i++){
buahHTML+=`<div class="word" onclick="speak('${buahData[i][0]}')">${buahData[i][0]} - ${buahData[i][1]}</div>`;
hewanHTML+=`<div class="word" onclick="speak('${hewanData[i][0]}')">${hewanData[i][0]} - ${hewanData[i][1]}</div>`;
}
document.getElementById("buah").innerHTML=buahHTML;
document.getElementById("hewan").innerHTML=hewanHTML;
}
renderData();

/* ===== ARABIKA ===== */

let currentMode="ar-SA";
document.getElementById("mode-ar").onclick=()=>currentMode="ar-SA";
document.getElementById("mode-id").onclick=()=>currentMode="id-ID";

const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
const recognition=new SpeechRecognition();

document.getElementById("start-btn").onclick=()=>{
recognition.lang=currentMode;
recognition.start();
document.getElementById("status-ar").innerText="Mendengarkan...";
};

recognition.onresult=(event)=>{
let result=event.results[0][0].transcript.toLowerCase();
document.getElementById("output").innerText=result;
speak(result);
};

recognition.onspeechend=()=>recognition.stop();

</script>
</body>
</html>
