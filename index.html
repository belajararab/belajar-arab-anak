<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dunia Anak Sholeh</title>

<style>
body{
  font-family:Arial;
  margin:0;
  padding:15px;
  background:linear-gradient(to bottom,#4FC3F7,#6EE7B7);
  color:white;
  text-align:center;
}

.title{
  font-size:28px;
  font-weight:bold;
  background:linear-gradient(45deg,#FFD93D,#FF6FAE);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.section{
  background:white;
  color:#333;
  margin:20px auto;
  padding:15px;
  border-radius:20px;
  max-width:500px;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

button{
  background:#FF6FAE;
  border:none;
  padding:10px 15px;
  margin:6px;
  border-radius:12px;
  color:white;
  cursor:pointer;
}

.word{
  background:#FFD93D;
  margin:6px;
  padding:8px;
  border-radius:10px;
  cursor:pointer;
}

.lock{
  background:#eee;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
}

/* AVATAR */
.avatar{
  width:160px;
  height:160px;
  margin:20px auto;
  border-radius:50%;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  transition:0.3s;
}
.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}
.talkEffect{
  animation:bounce 0.6s infinite alternate;
  box-shadow:0 0 30px #FF6FAE;
}
@keyframes bounce{
  from{transform:translateY(0px);}
  to{transform:translateY(-10px);}
}

.levelbox{
  background:white;
  color:#333;
  padding:8px;
  border-radius:12px;
  max-width:300px;
  margin:10px auto;
  font-weight:bold;
}
</style>
</head>
<body>

<div class="title">🌙 Dunia Anak Sholeh</div>
<div>Belajar Arab Ceria Anak Muslim</div>

<button onclick="startMusic()">▶️ Mulai Musik</button>
<audio id="bgAudio" loop>
<source src="https://actions.google.com/sounds/v1/ambiences/children_playing.ogg">
</audio>

<!-- FOTO DARI DROPBOX -->
<div class="avatar" id="avatar">
  <img src="https://www.dropbox.com/scl/fi/isjmai97h2zzojhksgkrq/1000376495.jpg?rlkey=tu6gf34mdj9q09qg9ga3jqvgp&raw=1">
</div>

<div id="levelBox" class="levelbox"></div>

<div class="section">
<h3>🔓 Aktifkan Premium</h3>
<input type="password" id="kode" placeholder="Masukkan kode">
<button onclick="unlock()">Unlock</button>
<div id="status"></div>
</div>

<div class="section">
<h3>🍎 Belajar Buah</h3>
<div id="buah"></div>
</div>

<div class="section">
<h3>🐰 Belajar Hewan</h3>
<div id="hewan"></div>
</div>

<div class="section">
<h3>👧 Almira Quiz</h3>
<button onclick="startQuiz()">Mulai Quiz</button>
<div id="quizArea"></div>
<div id="score"></div>
</div>

<div class="section">
<h3>🤖 Chat Arab Pintar</h3>
<input id="chatInput" placeholder="Tulis pertanyaan">
<button onclick="chat()">Kirim</button>
<div id="chatBox"></div>
</div>

<script>

let premium = localStorage.getItem("premium")==="true";
let level = parseInt(localStorage.getItem("level")) || 1;
let stars = parseInt(localStorage.getItem("stars")) || 0;

function updateLevelUI(){
document.getElementById("levelBox").innerHTML="⭐ "+stars+" | 🏆 Level "+level;
}
updateLevelUI();

function startMusic(){
document.getElementById("bgAudio").play();
}

function unlock(){
let kode=document.getElementById("kode").value;
if(kode==="ANAKSOLEH2026"){
premium=true;
localStorage.setItem("premium","true");
document.getElementById("status").innerHTML="✅ Premium Aktif!";
renderData();
}else{
document.getElementById("status").innerHTML="❌ Kode Salah";
}
}

function speak(text){
let u=new SpeechSynthesisUtterance(text);
u.lang="ar-SA";
let avatar=document.getElementById("avatar");
avatar.classList.add("talkEffect");
u.onend=function(){avatar.classList.remove("talkEffect");}
speechSynthesis.speak(u);
}

/* DATA */
const buahData=[["تُفَّاحٌ","Apel"],["مَوْزٌ","Pisang"],["بُرْتُقَالٌ","Jeruk"],["عِنَبٌ","Anggur"],["فَرَاوِلَةٌ","Stroberi"],["بَطِّيخٌ","Semangka"],["أَنَانَاسٌ","Nanas"],["مَانْجَا","Mangga"],["كَرَزٌ","Ceri"],["خَوْخٌ","Persik"],["لَيْمُونٌ","Lemon"],["رُمَّانٌ","Delima"],["جَوَّافَةٌ","Jambu"],["تَمْرٌ","Kurma"],["كُمَّثْرَى","Pir"],["أُفُوكَادُو","Alpukat"],["تِينٌ","Tin"],["زَبِيبٌ","Kismis"],["جُوزُ الْهِنْدِ","Kelapa"],["بَابَايَا","Pepaya"],["كِيوِي","Kiwi"],["سَفَرْجَلٌ","Quince"],["جِرِيبْ فُرُوت","Grapefruit"],["لِيتْشِي","Leci"],["تَمَرْ هِنْدِي","Asam"]];
const hewanData=[["قِطٌّ","Kucing"],["كَلْبٌ","Anjing"],["أَرْنَبٌ","Kelinci"],["فِيلٌ","Gajah"],["أَسَدٌ","Singa"],["بَقَرَةٌ","Sapi"],["حِصَانٌ","Kuda"],["دَجَاجَةٌ","Ayam"],["سَمَكَةٌ","Ikan"],["طَائِرٌ","Burung"],["قِرْدٌ","Monyet"],["نَمِرٌ","Harimau"],["زَرَافَةٌ","Jerapah"],["ذِئْبٌ","Serigala"],["دُبٌّ","Beruang"],["جَمَلٌ","Unta"],["غَنَمٌ","Kambing"],["حِمَارٌ","Keledai"],["فَأْرٌ","Tikus"],["ثُعْبَانٌ","Ular"],["سُلَحْفَاةٌ","Kura-kura"],["ضِفْدَعٌ","Katak"],["نَحْلَةٌ","Lebah"],["بَطَّةٌ","Bebek"],["حُوتٌ","Paus"]];

function renderData(){
let buahHTML="",hewanHTML="";
for(let i=0;i<buahData.length;i++){
buahHTML+=`<div class="word" onclick="speak('${buahData[i][0]}')">${buahData[i][0]} - ${buahData[i][1]}</div>`;
hewanHTML+=`<div class="word" onclick="speak('${hewanData[i][0]}')">${hewanData[i][0]} - ${hewanData[i][1]}</div>`;
}
document.getElementById("buah").innerHTML=buahHTML;
document.getElementById("hewan").innerHTML=hewanHTML;
}
renderData();

function startQuiz(){
alert("🎉 Quiz siap dimainkan!");
}

function chat(){
let input=document.getElementById("chatInput").value.toLowerCase();
let reply="عذراً لم أفهم السؤال";
if(input.includes("السلام")) reply="وعليكم السلام ورحمة الله وبركاته 💕";
if(input.includes("الله")) reply="الله ربنا خالق كل شيء 🌙";
document.getElementById("chatBox").innerHTML="🤖 "+reply;
speak(reply);
}

</script>

</body>
</html>
